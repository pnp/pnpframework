name: Nightly nuget release

on:
  workflow_dispatch:
  schedule:    
    - cron: '0 2 * * *'

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
        ref: dev
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    - name: publish nuget 
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      shell: pwsh
      run: |
        ./build/publish-nightly.ps1
